name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - master  # Deploy only when pushing to the 'master' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions: 
      contents: write

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24  # Specify the Node.js version

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Configure the git author identity
      - name: Configure Git Bot
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # FIX: Force Git to inject the automatic token for HTTPS authentication
      - name: Configure Git Authentication
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      # Step 5: Build the React app
      - name: Build React App
        run: npm run build

      # Step 6: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}